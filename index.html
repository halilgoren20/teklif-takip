<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teklif Takip — Görenler</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .app { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border-radius: 10px; padding: 0.75rem 1rem; border: 1px solid #e8e8e3; }
  .stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; }
  .stat-value.red { color: #c0392b; }
  .stat-value.amber { color: #d68910; }
  .stat-value.green { color: #1e8449; }
  .stat-value.blue { color: #1a5276; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 5px 12px; border: 1px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; color: #555; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn-yeni { font-size: 13px; padding: 8px 16px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; }
  .btn-yeni:hover { background: #333; }
  .tablo-wrap { background: #fff; border-radius: 12px; border: 1px solid #e8e8e3; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: #888; border-bottom: 1px solid #e8e8e3; white-space: nowrap; background: #fafaf8; }
  tbody tr { border-bottom: 1px solid #f0f0ec; cursor: pointer; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f9f9f6; }
  tbody td { padding: 10px 14px; vertical-align: middle; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; display: inline-block; }
  .badge.kirmizi { background: #fde8e8; color: #a93226; }
  .badge.sari { background: #fef5e7; color: #b7770d; }
  .badge.yesil { background: #e8f8f0; color: #1e8449; }
  .badge.mavi { background: #eaf2fb; color: #1a5276; }
  .badge.gri { background: #f2f3f4; color: #555; }
  .badge.beklemede-badge { background: #f0f0f0; color: #555; }
  .td-mail { color: #1a5276; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
  .td-konu { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }
  .loading { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }
  .popup { display: none; position: fixed; background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.13); z-index: 200; min-width: 170px; }
  .popup.open { display: block; }
  .popup-baslik { font-size: 11px; color: #888; padding: 4px 8px 6px; border-bottom: 1px solid #f0f0f0; margin-bottom: 4px; font-weight: 600; }
  .popup-btn { display: block; width: 100%; text-align: left; font-size: 13px; padding: 7px 10px; border: none; background: transparent; cursor: pointer; border-radius: 6px; color: #1a1a1a; }
  .popup-btn:hover { background: #f5f5f0; }
  .popup-btn.olumlu { color: #1e8449; }
  .popup-btn.olumsuz { color: #c0392b; }
  .popup-separator { height: 1px; background: #f0f0f0; margin: 4px 0; }
  .popup-btn.sil { color: #c0392b; }
  .popup-btn.duzenle { color: #1a5276; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
  .form-row { margin-bottom: 0.875rem; }
  .form-row label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  .form-row input, .form-row select { width: 100%; font-size: 14px; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a1a; }
  .form-row input:focus, .form-row select:focus { outline: none; border-color: #888; background: #fff; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .btn-iptal { font-size: 13px; padding: 8px 16px; background: #fff; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; color: #555; }
  .btn-kaydet { font-size: 13px; padding: 8px 16px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  @media (max-width: 500px) { .stats { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="app">
  <h1>Teklif Takip — Görenler</h1>
  <div class="stats">
    <div class="stat"><div class="stat-label">Açık teklifler</div><div class="stat-value blue" id="s-toplam">—</div></div>
    <div class="stat"><div class="stat-label">Acil takip (&gt;21 gün)</div><div class="stat-value red" id="s-acil">—</div></div>
    <div class="stat"><div class="stat-label">Yaklaşan (15-21 gün)</div><div class="stat-value amber" id="s-yaklasan">—</div></div>
    <div class="stat"><div class="stat-label">Bu ay kapanan</div><div class="stat-value green" id="s-kapanan">—</div></div>
  </div>
  <div class="topbar">
    <div class="filters">
      <button class="filter-btn active" onclick="filtrele('hepsi',this)">Hepsi</button>
      <button class="filter-btn" onclick="filtrele('acil',this)">Acil takip</button>
      <button class="filter-btn" onclick="filtrele('beklemede',this)">Beklemede</button>
      <button class="filter-btn" onclick="filtrele('olumlu',this)">Olumlu</button>
      <button class="filter-btn" onclick="filtrele('olumsuz',this)">Olumsuz</button>
    </div>
    <button class="btn-yeni" onclick="yeniModalAc()">+ Yeni teklif</button>
  </div>
  <div class="tablo-wrap">
    <table>
      <thead>
        <tr>
          <th>Tarih</th>
          <th>Gün</th>
          <th>Durum</th>
          <th>Temsilci</th>
          <th>Mail Başlığı</th>
          <th>Müşteri / Mail</th>
        </tr>
      </thead>
      <tbody id="tablo-body"><tr><td colspan="6" class="loading">Yükleniyor...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="popup" id="durum-popup">
  <div class="popup-baslik" id="popup-musteri"></div>
  <button class="popup-btn" onclick="durumGuncelle('beklemede')">Beklemede</button>
  <button class="popup-btn olumlu" onclick="durumGuncelle('olumlu')">Olumlu</button>
  <button class="popup-btn olumsuz" onclick="durumGuncelle('olumsuz')">Olumsuz</button>
  <div class="popup-separator"></div>
  <button class="popup-btn duzenle" onclick="duzenleAc()">Düzenle</button>
  <button class="popup-btn sil" onclick="silTeklif()">Sil</button>
</div>

<div class="overlay" id="yeni-overlay">
  <div class="modal">
    <h2 id="modal-baslik">Yeni teklif ekle</h2>
    <div class="form-row"><label>Müşteri adı *</label><input type="text" id="f-musteri" placeholder="Örn: ABC Tekstil A.Ş."></div>
    <div class="form-row"><label>Temsilci *</label>
      <select id="f-temsilci">
        <option value="">Seçin...</option>
        <option>Aslıhan</option>
        <option>Elay</option>
        <option>İmren</option>
        <option>Kemal</option>
        <option>Özlem ve Pelin</option>
        <option>Süleyman</option>
        <option>Yasir ve Yağmur</option>
      </select>
    </div>
    <div class="form-row"><label>Teklif tarihi *</label><input type="date" id="f-tarih"></div>
    <div class="form-row"><label>Mail Başlığı *</label><input type="text" id="f-konu" placeholder="Örn: Dokuma etiket teklifi talebi"></div>
    <div class="form-row"><label>Müşteri Mail *</label><input type="email" id="f-mail" placeholder="ornek@firma.com"></div>
    <div class="modal-actions">
      <button class="btn-iptal" onclick="kapat()">Vazgeç</button>
      <button class="btn-kaydet" onclick="kaydet()">Kaydet</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAdua4gFEsnFxSOrMoKQJExoVJmSzVcXAs",
    authDomain: "teklif-takip-ekrani.firebaseapp.com",
    projectId: "teklif-takip-ekrani",
    storageBucket: "teklif-takip-ekrani.firebasestorage.app",
    messagingSenderId: "855263926988",
    appId: "1:855263926988:web:adcc119dba1249eb268069"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const col = collection(db, "teklifler");

  let teklifler = [];
  let aktifFiltre = 'hepsi';
  let aktifId = null;

  function gunFarki(tarih) {
    return Math.floor((new Date() - new Date(tarih)) / 86400000);
  }

  function badgeInfo(t) {
    if (t.durum === 'olumlu') return { cls: 'mavi', label: 'Olumlu' };
    if (t.durum === 'olumsuz') return { cls: 'gri', label: 'Olumsuz' };
    const g = gunFarki(t.tarih);
    if (g > 21) return { cls: 'kirmizi', label: g + ' gün — Acil' };
    if (g >= 15) return { cls: 'sari', label: g + ' gün — Yaklaşıyor' };
    return { cls: 'yesil', label: g + ' gün' };
  }

  async function yukle() {
    try {
      const q = query(col, orderBy("tarih", "desc"));
      const snap = await getDocs(q);
      teklifler = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    } catch(e) {
      document.getElementById('tablo-body').innerHTML = '<tr><td colspan="6" class="empty">Veri yüklenemedi.</td></tr>';
    }
  }

  function render() {
    let liste = [...teklifler];
    const bugun = new Date();
    const ay = bugun.getMonth(); const yil = bugun.getFullYear();

    if (aktifFiltre === 'acil') liste = liste.filter(t => t.durum === 'beklemede' && gunFarki(t.tarih) > 21);
    else if (aktifFiltre === 'beklemede') liste = liste.filter(t => t.durum === 'beklemede');
    else if (aktifFiltre === 'olumlu') liste = liste.filter(t => t.durum === 'olumlu');
    else if (aktifFiltre === 'olumsuz') liste = liste.filter(t => t.durum === 'olumsuz');

    liste.sort((a, b) => {
      if (a.durum === 'beklemede' && b.durum !== 'beklemede') return -1;
      if (b.durum === 'beklemede' && a.durum !== 'beklemede') return 1;
      return gunFarki(b.tarih) - gunFarki(a.tarih);
    });

    const tbody = document.getElementById('tablo-body');
    if (liste.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">Gösterilecek teklif yok.</td></tr>';
    } else {
      tbody.innerHTML = liste.map(t => {
        const b = badgeInfo(t);
        const g = gunFarki(t.tarih);
        const gunRenk = g >= 22 ? '#c0392b' : g >= 14 ? '#d68910' : '#1e8449';
        const durumLabel = t.durum === 'olumlu' ? 'Olumlu' : t.durum === 'olumsuz' ? 'Olumsuz' : 'Beklemede';
        const durumCls = t.durum === 'olumlu' ? 'mavi' : t.durum === 'olumsuz' ? 'gri' : 'beklemede-badge';
        return `<tr onclick="satirTikla(event,'${t.id}')">
          <td>${t.tarih}</td>
          <td><span style="font-weight:600;color:${gunRenk}">${g} gün</span></td>
          <td><span class="badge ${durumCls}">${durumLabel}</span></td>
          <td>${t.temsilci}</td>
          <td class="td-konu" title="${t.konu}">${t.konu}</td>
          <td>
            <div style="font-weight:500">${t.musteri}</div>
            <div class="td-mail" title="${t.mail||''}">${t.mail||''}</div>
          </td>
        </tr>`;
      }).join('');
    }

    document.getElementById('s-toplam').textContent = teklifler.filter(t => t.durum === 'beklemede').length;
    document.getElementById('s-acil').textContent = teklifler.filter(t => t.durum === 'beklemede' && gunFarki(t.tarih) > 21).length;
    document.getElementById('s-yaklasan').textContent = teklifler.filter(t => t.durum === 'beklemede' && gunFarki(t.tarih) >= 15 && gunFarki(t.tarih) <= 21).length;
    document.getElementById('s-kapanan').textContent = teklifler.filter(t => {
      if (t.durum === 'beklemede') return false;
      const d = new Date(t.tarih);
      return d.getMonth() === ay && d.getFullYear() === yil;
    }).length;
  }

  window.satirTikla = function(e, id) {
    e.stopPropagation();
    aktifId = id;
    const t = teklifler.find(x => x.id === id);
    document.getElementById('popup-musteri').textContent = t.musteri;
    const popup = document.getElementById('durum-popup');
    popup.classList.add('open');
    let left = e.clientX;
    let top = e.clientY + 8;
    if (left + 180 > window.innerWidth) left = window.innerWidth - 190;
    if (top + 200 > window.innerHeight) top = e.clientY - 180;
    popup.style.top = top + 'px';
    popup.style.left = left + 'px';
  };

  window.filtrele = function(f, btn) {
    aktifFiltre = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };

  window.yeniModalAc = function() {
    aktifId = null;
    popupKapat();
    document.getElementById('modal-baslik').textContent = 'Yeni teklif ekle';
    document.getElementById('f-musteri').value = '';
    document.getElementById('f-temsilci').value = '';
    document.getElementById('f-tarih').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-konu').value = '';
    document.getElementById('f-mail').value = '';
    document.getElementById('yeni-overlay').classList.add('open');
  };

  window.kaydet = async function() {
    const m = document.getElementById('f-musteri').value.trim();
    const t = document.getElementById('f-temsilci').value;
    const ta = document.getElementById('f-tarih').value;
    const k = document.getElementById('f-konu').value.trim();
    const ml = document.getElementById('f-mail').value.trim();
    if (!m || !t || !ta || !k || !ml) { alert('Lütfen tüm zorunlu alanları doldurun.'); return; }
    const veri = { musteri: m, temsilci: t, tarih: ta, konu: k, mail: ml, durum: 'beklemede' };
    if (aktifId) {
      await updateDoc(doc(db, "teklifler", aktifId), { musteri: m, temsilci: t, tarih: ta, konu: k, mail: ml });
      aktifId = null;
    } else {
      await addDoc(col, veri);
    }
    kapat();
    await yukle();
  };

  window.durumGuncelle = async function(d) {
    await updateDoc(doc(db, "teklifler", aktifId), { durum: d });
    popupKapat();
    await yukle();
  };

  window.silTeklif = async function() {
    if (!confirm('Bu teklifi silmek istiyor musunuz?')) return;
    await deleteDoc(doc(db, "teklifler", aktifId));
    popupKapat();
    await yukle();
  };

  window.duzenleAc = function() {
    const t = teklifler.find(x => x.id === aktifId);
    popupKapat();
    document.getElementById('modal-baslik').textContent = 'Teklifi düzenle';
    document.getElementById('f-musteri').value = t.musteri;
    document.getElementById('f-temsilci').value = t.temsilci;
    document.getElementById('f-tarih').value = t.tarih;
    document.getElementById('f-konu').value = t.konu;
    document.getElementById('f-mail').value = t.mail || '';
    document.getElementById('yeni-overlay').classList.add('open');
  };

  function popupKapat() {
    document.getElementById('durum-popup').classList.remove('open');
  }

  window.kapat = function() {
    document.getElementById('yeni-overlay').classList.remove('open');
    popupKapat();
  };

  document.addEventListener('click', function(e) {
    const popup = document.getElementById('durum-popup');
    if (!popup.contains(e.target) && !e.target.closest('tr')) popupKapat();
  });

  document.getElementById('yeni-overlay').addEventListener('click', function(e) { if (e.target === this) kapat(); });

  yukle();
</script>
</body>
</html>
